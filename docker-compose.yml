services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      network: host   # билд видит localhost хост-машины → может подключиться к postgres:5432
      args:
        DATABASE_URL: ${DATABASE_URL}
        PAYLOAD_SECRET: ${PAYLOAD_SECRET}
        NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL}
        CRON_SECRET: ${CRON_SECRET}
        PREVIEW_SECRET: ${PREVIEW_SECRET}
    env_file:
      - .env
    environment:
      # Во время runtime переопределяем DATABASE_URL на имя сервиса compose-сети
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/marja-website
    ports:
      - '3000:3000'
    volumes:
      - media-uploads:/app/public/media
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/marja-website
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    profiles:
      - migrate

  postgres:
    image: postgres:17-alpine
    # ports:
    #   - '5432:5432'
    environment:
      POSTGRES_DB: marja-website
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d marja-website']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - internal

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    # Авто-обновление сертификата каждые 12 часов
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"
    restart: unless-stopped

volumes:
  pgdata:
  certbot-www:
  certbot-certs:
  media-uploads:

networks:
  internal:
    driver: bridge
