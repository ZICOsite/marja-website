# Временный конфиг (HTTP only).
# После запуска init-ssl.sh этот файл будет заменён на полный HTTP+HTTPS конфиг.

server {
    listen 80;
    server_name marja.uz www.marja.uz;

    # Для certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Пока сертификата нет — проксируем на приложение по HTTP
    location / {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
